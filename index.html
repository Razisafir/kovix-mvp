<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Kovix MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="app-header">
    <div class="header-left">
      <span class="logo-mark">&#9670;</span>
      <h1>Kovix <span class="header-sub">MVP</span></h1>
    </div>
    <div class="header-right">
      <span id="loop-badge" class="loop-badge idle">IDLE</span>
      <button id="btn-settings" title="Settings" class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button id="btn-reset" title="Start over">&#8635; Reset</button>
    </div>
  </header>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="btn-close-settings" class="modal-close" title="Close">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="input-api-key">OpenRouter API Key</label>
          <input type="password" id="input-api-key" placeholder="sk-or-v1-..." autocomplete="off" />
          <p class="form-hint">Get yours at <strong>openrouter.ai/keys</strong></p>
        </div>
        <div class="form-group">
          <label for="select-model">Model</label>
          <select id="select-model">
            <option value="openai/gpt-4o-mini">GPT-4o Mini (fast, cheap)</option>
            <option value="google/gemini-flash-1.5">Gemini Flash 1.5</option>
            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
            <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B (free)</option>
            <option value="anthropic/claude-3.5-haiku">Claude 3.5 Haiku</option>
            <option value="deepseek/deepseek-chat">DeepSeek V3</option>
          </select>
        </div>
        <div id="settings-status" class="settings-status"></div>
      </div>
      <div class="modal-footer">
        <button id="btn-save-settings" class="btn-primary">Save Settings</button>
      </div>
    </div>
  </div>

  <main id="app-main">
    <aside id="sidebar">
      <div class="sidebar-label">Workflow Steps</div>
      <ol id="steps-list">
        <li class="step active" data-step="idea">
          <span class="step-num">1</span>
          <span class="step-text">Idea</span>
        </li>
        <li class="step" data-step="refine">
          <span class="step-num">2</span>
          <span class="step-text">Refine</span>
        </li>
        <li class="step" data-step="spec">
          <span class="step-num">3</span>
          <span class="step-text">Spec</span>
        </li>
        <li class="step" data-step="plan">
          <span class="step-num">4</span>
          <span class="step-text">Plan</span>
        </li>
        <li class="step" data-step="execute">
          <span class="step-num">5</span>
          <span class="step-text">Execute</span>
        </li>
      </ol>
      <div id="loop-detail">
        <div class="sidebar-label" style="margin-top:20px;">Status</div>
        <div id="detail-content">
          <div class="detail-row">
            <span class="detail-key">Step</span>
            <span class="detail-val" id="detail-phase">idea</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">File</span>
            <span class="detail-val" id="detail-task">&mdash;</span>
          </div>
        </div>
      </div>
    </aside>

    <section id="chat-pane">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <div id="input-wrapper">
          <textarea id="chat-input" placeholder="Describe your idea&hellip;" rows="1"></textarea>
          <button id="btn-send" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
