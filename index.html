<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Kovix MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ============================ Header ============================ -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">K</div>
        <div class="brand-name">Kovix MVP</div>
      </div>
      <div class="header-actions">
        <button id="reset-btn" class="ghost-btn" title="Reset conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          <span>New</span>
        </button>
        <button id="settings-btn" class="ghost-btn" title="Open settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span>Settings</span>
        </button>
      </div>
    </header>

    <!-- ============================ Body ============================ -->
    <div class="app-body">
      <!-- Sidebar: 5 workflow steps -->
      <aside class="sidebar">
        <div class="sidebar-title">Workflow</div>
        <ol id="step-list" class="step-list">
          <li class="step-item active" data-step="idea">
            <span class="step-num">1</span>
            <span class="step-name">Idea</span>
          </li>
          <li class="step-item" data-step="refine">
            <span class="step-num">2</span>
            <span class="step-name">Refine</span>
          </li>
          <li class="step-item" data-step="spec">
            <span class="step-num">3</span>
            <span class="step-name">Spec</span>
          </li>
          <li class="step-item" data-step="plan">
            <span class="step-num">4</span>
            <span class="step-name">Plan</span>
          </li>
          <li class="step-item" data-step="execute">
            <span class="step-num">5</span>
            <span class="step-name">Execute</span>
          </li>
        </ol>
        <div class="sidebar-footer">
          <div class="status-card">
            <div class="status-row">
              <span class="status-label">Provider</span>
              <span id="status-provider" class="status-value">—</span>
            </div>
            <div class="status-row">
              <span class="status-label">Model</span>
              <span id="status-model" class="status-value">—</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main: chat -->
      <main class="chat-pane">
        <div id="messages" class="messages">
          <div class="welcome">
            <div class="welcome-title">Welcome to Kovix MVP</div>
            <div class="welcome-sub">
              Start by typing an idea. The 5-step workflow will refine it into a spec, plan the
              build, then write code to <code>output.txt</code>.
            </div>
          </div>
        </div>

        <div class="composer">
          <div id="error-banner" class="error-banner hidden"></div>
          <div id="info-banner" class="info-banner hidden"></div>
          <div class="composer-row">
            <textarea id="input" class="input" rows="1"
                      placeholder="Type your idea and press Send…"></textarea>
            <button id="send-btn" class="primary-btn">Send</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ============================ Settings Modal ============================ -->
  <div id="settings-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="icon-btn" data-close aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="">— Select a provider —</option>
            <option value="openai">OpenAI</option>
            <option value="openrouter">OpenRouter</option>
            <option value="anthropic">Anthropic</option>
            <option value="ollama">Ollama</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>

        <div class="field">
          <label for="api-key">API Key</label>
          <input id="api-key" type="password" placeholder="sk-…" autocomplete="off" />
        </div>

        <div class="field">
          <label for="base-url">Base URL <span class="hint">(optional — defaults applied if blank)</span></label>
          <input id="base-url" type="text" placeholder="https://api.openai.com/v1" />
        </div>

        <div class="field row">
          <div class="grow">
            <label for="model">Model</label>
            <select id="model" disabled>
              <option value="">Click “Fetch Models” first</option>
            </select>
          </div>
          <button id="fetch-models-btn" class="secondary-btn" type="button">Fetch Models</button>
        </div>

        <div id="settings-error" class="error-banner hidden"></div>
        <div id="settings-info" class="info-banner hidden"></div>
      </div>

      <div class="modal-footer">
        <button class="ghost-btn" data-close>Cancel</button>
        <button id="save-settings-btn" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
