name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (npm run check)
        run: npm run check

      - name: Staging engine smoke tests (Task Alpha)
        run: node scripts/smoke-staging.js

      - name: Agent routing integration tests (Task Gamma)
        run: node scripts/smoke-gamma.js

      - name: Multi-file extraction tests (Task Zeta)
        run: node scripts/smoke-zeta.js

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Syntax check passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ 42 staging engine tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ 21 agent routing tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ 66 multi-file extraction tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: 129 tests passing**" >> $GITHUB_STEP_SUMMARY
